services:
  postgres:
    image: postgres:16-alpine
    container_name: trade-pilot-postgres
    environment:
      POSTGRES_DB: trade_pilot
      POSTGRES_USER: trade_pilot
      POSTGRES_PASSWORD: trade_pilot
    ports:
      - "5432:5432"
    volumes:
      - trade_pilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_pilot -d trade_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: trade-pilot-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://trade_pilot:trade_pilot@postgres:5432/trade_pilot
      BROKER_MODE: paper
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  admin-web:
    build:
      context: ./admin-web
    container_name: trade-pilot-admin-web
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  user-web:
    build:
      context: ./user-web
    container_name: trade-pilot-user-web
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5174:5174"
    command: npm run dev -- --host 0.0.0.0

volumes:
  trade_pilot_pg:
